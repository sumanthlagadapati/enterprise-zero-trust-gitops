apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-apm-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  fastapi-apm.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": 2,
      "links": [],
      "panels": [
        {
          "type": "row",
          "title": "Application Performance Monitoring (APM) - Microservices",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }
        },
        {
          "type": "stat",
          "title": "Total Requests (User Service)",
          "gridPos": { "x": 0, "y": 1, "w": 8, "h": 4 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{app=\"user-service\"}[5m]))",
              "legendFormat": "User Service"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Requests (Trading Service)",
          "gridPos": { "x": 8, "y": 1, "w": 8, "h": 4 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{app=\"trading-service\"}[5m]))",
              "legendFormat": "Trading Service"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Requests (Payment Service)",
          "gridPos": { "x": 16, "y": 1, "w": 8, "h": 4 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{app=\"payment-service\"}[5m]))",
              "legendFormat": "Payment Service"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP Error Rates (5xx)",
          "gridPos": { "x": 0, "y": 5, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m])) by (app)",
              "legendFormat": "{{app}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Response Latency (p99)",
          "gridPos": { "x": 12, "y": 5, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, app))",
              "legendFormat": "{{app}}"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 30,
      "style": "dark",
      "tags": ["apm", "fastapi", "microservices"],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "query": "label_values(namespace)",
            "refresh": 1
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Microservices APM",
      "uid": "fastapi-apm-01",
      "version": 1
    }
